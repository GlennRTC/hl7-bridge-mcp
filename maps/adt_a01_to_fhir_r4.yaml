id: adt_a01_to_fhir_r4
messageType: ADT^A01
target: fhir/R4
resources:
  - type: Patient
    from: PID
    map:
      # PID-3 puede repetir (MR, SS...) → un identifier por repetición (comodín [*]).
      - { from: "PID-3[*].1", to: "identifier[*].value" }
      # ponytail: PID-3.4 (namespace ID) → identifier.system tal cual (v2-to-FHIR IG).
      # OID en 3.4.2 (tipo ISO) necesitaría urn:oid vía transform; añadirlo cuando aparezca.
      - { from: "PID-3[*].4", to: "identifier[*].system" }
      - { from: PID-5.1, to: "name[0].family" }
      - { from: PID-5.2, to: "name[0].given[0]" }
      - { from: PID-7, to: birthDate, transform: hl7_datetime }
      - { from: PID-8, to: gender, transform: hl7_sex }
      - { from: PID-11.1, to: "address[0].line[0]" }
      - { from: PID-11.3, to: "address[0].city" }
      - { from: PID-11.4, to: "address[0].state" }
      - { from: PID-11.5, to: "address[0].postalCode" }
      - { from: PID-11.6, to: "address[0].country" }
      - { to: "telecom[0].system", value: phone }
      - { from: PID-13, to: "telecom[0].value" }
  - type: Encounter
    from: PV1
    map:
      # A01 = admisión en curso.
      - { to: status, value: in-progress }
      # PV1-2 (tabla 0004) → Encounter.class (Coding). E/I/O/P→v3-ActCode; R/B/C/N/U→v2-0004.
      - { from: PV1-2, to: class, transform: hl7_patient_class }
      - { to: subject, ref: Patient }
notes: "Mapa mínimo de admisión. Sin NK1 (Patient.contact) ni PV1-7 (participant) en v0.1."
