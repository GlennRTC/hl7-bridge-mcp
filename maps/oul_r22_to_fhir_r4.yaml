id: oul_r22_to_fhir_r4
messageType: OUL^R22
target: fhir/R4
# OUL^R22 (Unsolicited Specimen Oriented Observation) → Patient + Specimen + Observation(es).
# Orientado a espécimen: el núcleo es SPM→Specimen + OBX→Observation, con la Observation
# referenciando al Specimen. Estructura y campos validados contra spec v2.5.1 + v2-to-FHIR IG
# + auditoría clínica (2026-07). Alcance v0.1: un solo SPM por mensaje (ver nota abajo).
resources:
  - type: Patient
    from: PID
    map:
      - { from: "PID-3[1].1", to: "identifier[0].value" }
      - { from: "PID-3[1].4", to: "identifier[0].system" }
      - { from: PID-5.1, to: "name[0].family" }
      - { from: PID-5.2, to: "name[0].given[0]" }
      - { from: PID-7, to: birthDate, transform: hl7_datetime }
      - { from: PID-8, to: gender, transform: hl7_sex }
  - type: Specimen
    from: SPM
    map:
      # SPM-2 (Specimen ID, EIP): SPM-2.1 = placer assigned ID, SPM-2.2 = filler assigned ID.
      # Se preservan como identifiers distintos (v2-to-FHIR IG): son IDs de sistemas asignadores
      # diferentes (p.ej. LIS vs. analizador) para el MISMO espécimen; fusionarlos pierde trazabilidad.
      - { from: SPM-2.1, to: "identifier[0].value" }
      - { from: SPM-2.2, to: "identifier[1].value" }
      # ponytail: identifier.system (autoridad asignadora, HD en SPM-2.x.2/.3) se omite, no se
      # fabrica — mismo criterio que CODING_NO_SYSTEM. Extraer el HD es el siguiente escalón si un feed lo trae.
      # SPM-4 (tabla 0487, CWE) → Specimen.type. R en spec v2.5.1. system solo si el código está registrado.
      - { from: SPM-4.1, to: "type.coding[0].code" }
      - { from: SPM-4.2, to: "type.coding[0].display" }
      - { from: SPM-4.3, to: "type.coding[0].system", transform: hl7_coding_system }
      - { to: subject, ref: Patient }
  - type: Observation
    from: OBX
    map:
      # category: constante deliberada (US Core la exige); un OUL^R22 es laboratorio, HL7 v2 no la porta.
      - { to: "category[0].coding[0].system", value: "http://terminology.hl7.org/CodeSystem/observation-category" }
      - { to: "category[0].coding[0].code", value: laboratory }
      - { from: OBX-11, to: status, transform: hl7_result_status }
      - { from: OBX-3.1, to: "code.coding[0].code" }
      - { from: OBX-3.2, to: "code.coding[0].display" }
      - { from: OBX-3.3, to: "code.coding[0].system", transform: hl7_coding_system }
      - { from: OBX-5, to: ".", transform: obx_value_by_obx2 }
      - { from: OBX-14, to: effectiveDateTime, transform: hl7_datetime }
      - { to: subject, ref: Patient }
      # ref al único Specimen del bundle. Con >1 SPM el mapper falla ruidosamente (MAP_INVALID):
      # "la primera" ataría cada OBX al espécimen equivocado. La agrupación SPM→OBX es el siguiente escalón.
      - { to: specimen, ref: Specimen }
notes: >-
  OUL^R22 → Patient + Specimen + Observation(es). v0.1: un solo SPM por mensaje (el mapper rechaza
  >1 hasta implementar la agrupación SPM→OBX). Diferidos: DiagnosticReport (desde OBR, obligatorio
  por spec pero no consumido), SAC (contenedor), TCD e INV (reactivo/QC), y QC/no-paciente
  (SPM-11 ≠ P, requiere perfil Observation con subject 0..1). La Observation referencia al Specimen vía Observation.specimen.
