id: orm_o01_to_fhir_r4
messageType: ORM^O01
target: fhir/R4
resources:
  - type: Patient
    from: PID
    map:
      - { from: "PID-3[1].1", to: "identifier[0].value" }
      # ponytail: PID-3.4 (namespace ID) → identifier.system tal cual (v2-to-FHIR IG).
      # OID en 3.4.2 (tipo ISO) necesitaría urn:oid vía transform; añadirlo cuando aparezca.
      - { from: "PID-3[1].4", to: "identifier[0].system" }
      - { from: PID-5.1, to: "name[0].family" }
      - { from: PID-5.2, to: "name[0].given[0]" }
      - { from: PID-7, to: birthDate, transform: hl7_datetime }
      - { from: PID-8, to: gender, transform: hl7_sex }
  - type: ServiceRequest
    from: ORC
    map:
      # ORC-1 (tabla 0119) → status. TODO(mapeo): ORC-5 (tabla 0038) debería tener
      # precedencia si está poblado, pero el v2-to-FHIR IG no publica ConceptMap 0038; requiere validación de Glenn.
      - { from: ORC-1, to: status, transform: hl7_order_status }
      - { to: intent, value: order }
      - { from: OBR-4.1, to: "code.coding[0].code" }
      - { from: OBR-4.2, to: "code.coding[0].display" }
      - { from: ORC-9, to: authoredOn, transform: hl7_datetime }
      - { to: subject, ref: Patient }
notes: "Un ServiceRequest por ORC; OBR-4 se resuelve sobre la primera ocurrencia global en v0.1."
