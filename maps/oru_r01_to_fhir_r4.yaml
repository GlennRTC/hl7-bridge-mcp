id: oru_r01_to_fhir_r4
messageType: ORU^R01
target: fhir/R4
resources:
  - type: Patient
    from: PID
    map:
      - { from: "PID-3[1].1", to: "identifier[0].value" }
      # ponytail: PID-3.4 (namespace ID) → identifier.system tal cual, como hace el v2-to-FHIR IG
      # para autoridades sin universal ID. Un feed con OID en 3.4.2 (tipo ISO en 3.4.3) necesitaría
      # urn:oid vía transform; añadirlo cuando aparezca uno.
      - { from: "PID-3[1].4", to: "identifier[0].system" }
      - { from: PID-5.1, to: "name[0].family" }
      - { from: PID-5.2, to: "name[0].given[0]" }
      - { from: PID-7, to: birthDate, transform: hl7_datetime }
      - { from: PID-8, to: gender, transform: hl7_sex }
  - type: Observation
    from: OBX
    map:
      # category: constante deliberada, no un valor adivinado de un campo. HL7 v2 no tiene
      # ningún campo que la porte y un ORU^R01 es siempre laboratorio (US Core la exige).
      - { to: "category[0].coding[0].system", value: "http://terminology.hl7.org/CodeSystem/observation-category" }
      - { to: "category[0].coding[0].code", value: laboratory }
      - { from: OBX-11, to: status, transform: hl7_result_status }
      - { from: OBX-3.1, to: "code.coding[0].code" }
      - { from: OBX-3.2, to: "code.coding[0].display" }
      # OBX-3.3 (tabla 0396) → system URI; LN→LOINC, SCT→SNOMED. Códigos no registrados no pueblan system.
      - { from: OBX-3.3, to: "code.coding[0].system", transform: hl7_coding_system }
      - { from: OBX-5, to: ".", transform: obx_value_by_obx2 }
      # OBX-8 (tabla 0078) → interpretation. Code verbatim (identidad con v3 para códigos
      # comunes); system vía lookup, no registrado → sin system (validador avisa CODING_NO_SYSTEM).
      # [*] expande cada repetición (~) a su propio interpretation[n].
      - { from: "OBX-8[*].1", to: "interpretation[*].coding[0].code" }
      - { from: "OBX-8[*].1", to: "interpretation[*].coding[0].system", transform: hl7_interpretation_system }
      # OBX-7 (ST libre) → referenceRange.text verbatim (resolveV2Path ya omite vacíos).
      # TODO(mapeo): parsing estructurado low/high es ambiguo (signos, unidades embebidas,
      # texto cualitativo); requiere validación de Glenn por vendor antes de escribir un parser.
      - { from: OBX-7, to: "referenceRange[0].text" }
      - { from: OBX-14, to: effectiveDateTime, transform: hl7_datetime }
      - { to: subject, ref: Patient }
  - type: DiagnosticReport
    from: OBR
    map:
      # US Core DiagnosticReport-Lab: category fija LAB en v2-0074 (distinta de Observation.category).
      - { to: "category[0].coding[0].system", value: "http://terminology.hl7.org/CodeSystem/v2-0074" }
      - { to: "category[0].coding[0].code", value: LAB }
      - { from: OBR-25, to: status, transform: hl7_report_status }
      - { from: OBR-4.1, to: "code.coding[0].code" }
      - { from: OBR-4.2, to: "code.coding[0].display" }
      - { from: OBR-4.3, to: "code.coding[0].system", transform: hl7_coding_system }
      # ponytail: refAll referencia TODAS las Observations del bundle; correcto solo con un
      # único OBR por mensaje. El motor lanza MAP_INVALID si hay >1 OBR. La agrupación real
      # OBR→OBX (por orden de segmento) es el siguiente escalón, implementar ante un feed multi-OBR real.
      - { to: result, refAll: Observation }
      - { to: subject, ref: Patient }
notes: >-
  ORU^R01 → Patient + Observation(es) + DiagnosticReport (uno por OBR). Sin NTE →
  Observation.note en v0.1; effective/issued del DiagnosticReport (OBR-7/OBR-22) pendientes.
